<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Face Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <div class="max-w-5xl mx-auto px-4 py-10">
        <header class="flex justify-between items-center mb-10 border-b pb-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Shield Attendance</h1>
                <p class="text-sm text-gray-500 mt-1">ESP32 + AI Face Recognition</p>
            </div>
            <div class="flex items-center space-x-3">
                <span class="relative flex h-3 w-3">
                    <span id="ping-indicator"
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span id="dot-indicator" class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                </span>
                <span id="status-text" class="text-sm font-semibold text-gray-700 tracking-wide">Connecting...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <div class="col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="bg-gray-100 px-6 py-4 border-b border-gray-200">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-500">Live Camera Feed</h2>
                </div>
                <div class="relative w-full aspect-video bg-gray-900 flex items-center justify-center">
                    <img id="video-stream" src="" class="hidden w-full h-full object-cover">
                    <div id="idle-state" class="text-center text-gray-400">
                        <svg class="mx-auto h-12 w-12 mb-3 opacity-50" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z">
                            </path>
                        </svg>
                        <p>Camera is offline.</p>
                        <p class="text-sm mt-1">Tap RFID to start session.</p>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-500 mb-4">Current Session</h2>
                    <ul id="attendee-list" class="space-y-2">
                        <li class="text-gray-400 text-sm italic">No faces detected yet...</li>
                    </ul>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-500 mb-4">Reports</h2>
                    <a id="download-btn" href="/download"
                        class="pointer-events-none opacity-50 inline-block w-full bg-black text-white font-medium py-3 px-4 rounded-xl transition-all duration-200 hover:bg-gray-800">
                        Download Excel Log
                    </a>
                    <p id="download-hint" class="text-xs text-gray-400 mt-3">Available after session ends.</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        const statusText = document.getElementById('status-text');
        const dotIndicator = document.getElementById('dot-indicator');
        const pingIndicator = document.getElementById('ping-indicator');
        const videoStream = document.getElementById('video-stream');
        const idleState = document.getElementById('idle-state');
        const attendeeList = document.getElementById('attendee-list');
        const downloadBtn = document.getElementById('download-btn');
        const downloadHint = document.getElementById('download-hint');

        setInterval(async () => {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                statusText.innerText = data.state;

                // Download Button Logic
                if (data.file_ready && data.state === "Session Ended") {
                    downloadBtn.classList.remove('pointer-events-none', 'opacity-50');
                    downloadBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                    downloadHint.innerText = "Ready for download!";
                }

                // Camera UI Logic
                if (data.is_recording) {
                    dotIndicator.className = "relative inline-flex rounded-full h-3 w-3 bg-red-500";
                    pingIndicator.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75";

                    videoStream.src = "/video_feed?" + new Date().getTime();
                    videoStream.classList.remove('hidden');
                    idleState.classList.add('hidden');
                } else {
                    dotIndicator.className = "relative inline-flex rounded-full h-3 w-3 bg-blue-500";
                    pingIndicator.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75";

                    videoStream.src = "";
                    videoStream.classList.add('hidden');
                    idleState.classList.remove('hidden');

                    if (data.state === "Session Ended") {
                        idleState.innerHTML = '<p class="text-green-500 font-bold text-xl">Class Ended</p><p class="text-sm text-gray-400 mt-2">Download attendance report below.</p>';
                    } else if (data.state.includes("RFID ON")) {
                        idleState.innerHTML = '<p class="text-yellow-500 font-bold text-lg">Camera Disabled</p><p class="text-sm text-gray-400 mt-2">RFID Scanner remains active for breaks.</p>';
                    }
                }

                // Beautiful Green/Yellow List Rendering
                if (data.attendees.length > 0) {
                    attendeeList.innerHTML = data.attendees.map(student => {
                        // Dynamically apply Tailwind colors based on IN/OUT status
                        let colorClass = student.status === "IN" ? "bg-green-500" : "bg-yellow-400";
                        let textClass = student.status === "IN" ? "text-gray-800" : "text-yellow-600";
                        let bgClass = student.status === "IN" ? "bg-white border-gray-100" : "bg-yellow-50 border-yellow-100";

                        return `
                        <li class="flex items-center justify-between p-3 rounded-xl border shadow-sm transition-all duration-300 ${bgClass}">
                            <div class="flex items-center space-x-3">
                                <span class="h-3 w-3 ${colorClass} rounded-full shadow-sm"></span>
                                <span class="${textClass} font-semibold">${student.name}</span>
                            </div>
                            <span class="text-xs font-bold uppercase tracking-wider ${textClass}">${student.msg}</span>
                        </li>`;
                    }).join('');
                } else {
                    attendeeList.innerHTML = '<li class="text-gray-400 text-sm italic">Waiting for students...</li>';
                }

            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }, 1000);
    </script>
</body>

</html>
